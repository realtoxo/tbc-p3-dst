    WH.markup.printHtml("[toc]Welcome to Wowhead's Best in Slot Gear list from Phase 3 Black Temple and Mount Hyjal for Enhancement Shaman DPS in The Burning Crusade Classic. This guide will list the recommended gear for Enhancement Shaman DPS to acquire while they progress during the third phase of The Burning Crusade Classic, and contains gear sourced from Black Temple and Mount Hyjal, plus other pieces from previous phases like Serpentshrine Cavern, Tempest Keep, heroic dungeons, arena PvP Gear, professions, BoE World Drops, and reputations.\r\n\r\n[h2 toc=\"Best In Slot Gear in Phase 3\" type=bar][color=q1]Best In Slot Gear for [color=shaman]Enhancement Shaman[\/color] DPS in Phase 3[\/color][\/h2]\r\n\r\nUnfortunately (or fortunately, depending on how you see it), Enhancement [class=7] Tier 6 set is not very good, unlike that of most classes and other Shaman specializations. On the positive side, this means you will be able to ignore the general rush for Tier 6 gear, but it also means that the drops you need are more subject to randomness than Tier tokens.\r\n\r\nHold on to your Tier 5 4-piece bonus for as long as possible, as it provides a large amount of DPS. Overall, you should look to swap it out when you have 2 to 3 Phase 3 replacement pieces, rather than breaking it immediately. As with every phase, doing Arena PvP is still very valuable for the Season 3 gladiator weapons, but using double [item=32262] for their very slow speed is your best option in this phase, even if their stats are lackluster.\r\n\r\n[span class=\"socket-meta q0\"][\/span][b]Meta sockets[\/b] are unique to head slot pieces and accept meta gems (instead of regular gems). Only a single meta socket may exist in any given piece, and many pieces come without a meta socket at all.\r\n\r\n[item=32409] is the best meta gem, and scales well with the rest of your gear, as it acts as a multiplier on your damage output. Enhancement Shaman looking to add Enchants and Gems to their BiS gear should take a look at our guide below: \r\n\r\n[center][cta-button guide=12995 icon=inv_jewelcrafting_livingruby_03]Enhancement Shaman Gems & Enchants[\/cta-button][\/center]\r\n\r\n[ul]\r\nBelow is an example set of gear with the best pieces available for each slot:\r\n\r\n[center][gear-planner=shaman\/orc\/A0YRJQAxUB9QBSAhBQETNTEVH_CBQH3rinwAfpkgfcECAH4EgwB_RYpZhWB4uW04AH3TIH3BQH3ZBkB1mgB9wSB904dgeLSKogB9wSB9wUB9wYhAfm6E1wB9wSB92YkgeI9s-wB9wYoAfeqEywsAcnUMAH7xDQBwng4AfvmPAH5DhNSQAH4GbVCRAH4GbVASAGyn][\/center]\r\n[\/ul]\r\n\r\n[h3 toc=\"Aldor vs Scryer\"]Should Enhancement Shaman DPS Choose Aldor or Scryer for BiS in TBC Classic Phase 3?[\/h3]\r\nShamans can pick both [faction=932] or [faction=934] without much penalty. The Aldor shoulder enchant is slightly better, but the difference is minuscule from the Scryers enchant when considering your full gear stat bonuses. In general, it is best to pick based on which faction is cheaper to buy reputation materials for, as Aldor, for example, can often be extremely expensive due to having the favored shoulder enchant for most specializations.\r\n\r\n[ul][li]Aldor offer a [i]very slightly[\/i] superior shoulder enchant for DPS.[\/li]\r\n[li]Scryers are usually the less popular faction, making their reputation turn-in items often cheaper than Aldor equivalents.[\/li][\/ul]\r\n\r\n[center][cta-button guide=12264 icon=ability_mount_warhippogryph border=strong]Reputations Overview TBC Classic[\/cta-button][\/center]\r\n\r\n[h3 toc=\"Head\"]Best in Slot Head Armor for Enhancement Shaman in TBC Classic Phase 3[\/h3]\r\n\r\n[b]Cursed Vision of Sargeras[\/b] is the best head option available by far, with impressive stats and a sleek look to go with them. Since you will be passing on all Tier 6 set pieces, this will be your main chase item alongside your weapons. [u]This will, however, be nearly every other physical DPS's BiS head option as well[\/u]. You can also use [b]Forest Prowler's Helm[\/b] or [b]Skyshatter Cover[\/b] as temporary alternatives, but note that the Tier 6 helmet has much weaker throughput stats and the Tier 6 set bonuses are pretty weak for Enhancement [class=7]s.\r\n\r\n[b]Cataclysm Helm[\/b] is still a great helmet, sporting great stats and a meta socket.[b] Surestrike Goggles v2.0[\/b] are also fine, but do not contribute towards a set bonus. Alternatively, you can use [b]Cyclone Helm[\/b], which is a strong helm for a physical damage party due to the Tier 4 2-piece set bonus.\r\n\r\n[pad]\r\n[center]\r\n[table class=grid width=70%]\r\n[tr] \r\n[td background=c7 width=10%][b]Rank[\/b][\/td]\r\n[td background=c7 width=25%][b]Item[\/b][\/td]\r\n[td background=c7 width=35%][b]Source[\/b][\/td]\r\n[\/tr] \r\n\r\n[tr][td]Best in slot[\/td]\r\n[td][item=32235][\/td]\r\n[td]Drop: [npc=22917] (Black Temple)[\/td]\r\n[\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=31015][\/td]\r\n[td]Drop: Helm of the Forgotten Protector - [npc=17968] (Hyjal Summit)[\/td]\r\n[\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=32376][\/td]\r\n[td]Drop: [npc=23426] (Black Temple)[\/td]\r\n[\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=30190][\/td]\r\n[td]Drop: Helm of the Vanquished Champion: [npc=21212] (Serpentshrine Cavern)[\/td]\r\n[\/tr]\r\n[\/table]\r\n[\/center]\r\n\r\nIf you don't have access to the recommendation above, here are further options to choose from or farm:\r\n[toggler name=\"Other Head Armor Recommendations\" closed=true toc=false]\r\n[center]\r\n[table class=grid width=70%]\r\n[tr] \r\n[td background=c7 width=10%][b]Rank[\/b][\/td]\r\n[td background=c7 width=25%][b]Item[\/b][\/td]\r\n[td background=c7 width=35%][b]Source[\/b][\/td]\r\n[\/tr] \r\n\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=32474][\/td]\r\n[td]Profession: [skill=202] (BoP)[\/td][\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=29040][\/td]\r\n[td]Drop: Telm of the Fallen Champion: [npc=15690] (Karazhan)[\/td]\r\n[\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=28224][\/td]\r\n[td]Drop: [npc=18096] (Heroic Old Hillsbrad Foothills)[\/td][\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=28182][\/td]\r\n[td]Quest: [quest=9763][\/td][\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=28732][\/td]\r\n[td]Drop: [npc=15689] (Karazhan)[\/td][\/tr]\r\n[\/table]\r\n[\/center]\r\n[\/toggler]\r\n\r\n\r\n[h3 toc=\"Shoulder\"]Best in Slot Shoulder Armor for Enhancement Shaman  in TBC Classic Phase 3[\/h3]\r\nThe crafted [b]Swiftstrike Shoulders[\/b] \/ [b]Shoulders of Lightning Reflexes[\/b] are Enhancement's best shoulders in Tier 6, and very close in power. The former edges out in pure power, while the latter provides a little more longevity with its Intellect. \r\n\r\nAlternatively, you can still use [b]Shoulderpads of the Stranger[\/b] or [b]Mantle of Darkness[\/b], which are slightly worse, but still very strong, overall.\r\n\r\n[pad]\r\n[center]\r\n[table class=grid width=70%]\r\n[tr] \r\n[td background=c7 width=10%][b]Rank[\/b][\/td]\r\n[td background=c7 width=25%][b]Item[\/b][\/td]\r\n[td background=c7 width=35%][b]Source[\/b][\/td]\r\n[\/tr] \r\n\r\n[tr][td]Best in slot[\/td]\r\n[td][item=32581][\/td]\r\n[td]Profession: [skill=165] (BoP)[\/td][\/tr]\r\n\r\n[tr][td]Best in slot[\/td]\r\n[td][item=32575][\/td]\r\n[td]Profession: [skill=165] (BoP)[\/td][\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=30055][\/td]\r\n[td]Drop: [npc=21216] (Serpentshrine Cavern)[\/td][\/tr]\r\n\r\n[tr][td]Great[\/td]\r\n[td][item=32377][\/td]\r\n[td]Drop: [npc=22887] (Black Temple)[\/td]\r\n[\/tr]\r\n[\/table]\r\n[\/center]\r\n\r\nIf you don't have access to the recommendation above, here are further options to choose from or farm:\r\n[toggler name=\"Other Shoulder Armor Recommendations\" closed=true toc=false]\r\n\r\n[pad]\r\n[center]\r\n[table class=grid width=70%]\r\n[tr] \r\n[td background=c7 width=10%][b]Rank[\/b][\/td]\r\n[td background=c7 width=25%][b]Item[\/b][\/td]\r\n[td background=c7 width=35%][b]Source[\/b][\/td]\r\n[\/tr] \r\n\r\n[tr][td]Great[\/td]\r\n[td][item=29043][\/td]\r\n[td]Drop: Pauldrons of the Fallen Cha                 <noscript>Welcome to Wowhead's Best in Slot Gear list from Phase 3 Black Temple and Mount Hyjal for Enhancement Shaman DPS in The Burning Crusade Classic. This guide will list the recommended gear for Enhancement Shaman DPS to acquire while they progress during the third phase of The Burning Crusade Classic, and contains gear sourced from Black Temple and Mount Hyjal, plus other pieces from previous phases like Serpentshrine Cavern, Tempest Keep, heroic dungeons, arena PvP Gear, professions, BoE World Drops, and reputations.<br /><br /><h2 class="heading-size-2">Best In Slot Gear for Enhancement Shaman DPS in Phase 3</h2><br /><br />Unfortunately (or fortunately, depending on how you see it), Enhancement <a href="/tbc/class=7/shaman">Shaman</a> Tier 6 set is not very good, unlike that of most classes and other Shaman specializations. On the positive side, this means you will be able to ignore the general rush for Tier 6 gear, but it also means that the drops you need are more subject to randomness than Tier tokens.<br /><br />Hold on to your Tier 5 4-piece bonus for as long as possible, as it provides a large amount of DPS. Overall, you should look to swap it out when you have 2 to 3 Phase 3 replacement pieces, rather than breaking it immediately. As with every phase, doing Arena PvP is still very valuable for the Season 3 gladiator weapons, but using double <a href="/tbc/item=32262/syphon-of-the-nathrezim">Syphon of the Nathrezim</a> for their very slow speed is your best option in this phase, even if their stats are lackluster.<br /><br /><b>Meta sockets</b> are unique to head slot pieces and accept meta gems (instead of regular gems). Only a single meta socket may exist in any given piece, and many pieces come without a meta socket at all.<br /><br /><a href="/tbc/item=32409/relentless-earthstorm-diamond">Relentless Earthstorm Diamond</a> is the best meta gem, and scales well with the rest of your gear, as it acts as a multiplier on your damage output. Enhancement Shaman looking to add Enchants and Gems to their BiS gear should take a look at our guide below: <br /><br />Enhancement Shaman Gems &amp; Enchants<br /><br /><h3 class="heading-size-3">Should Enhancement Shaman DPS Choose Aldor or Scryer for BiS in TBC Classic Phase 3?</h3><br />Shamans can pick both <a href="/tbc/faction=932/the-aldor">The Aldor</a> or <a href="/tbc/faction=934/the-scryers">The Scryers</a> without much penalty. The Aldor shoulder enchant is slightly better, but the difference is minuscule from the Scryers enchant when considering your full gear stat bonuses. In general, it is best to pick based on which faction is cheaper to buy reputation materials for, as Aldor, for example, can often be extremely expensive due to having the favored shoulder enchant for most specializations.<br /><br /><ul><li>Aldor offer a <i>very slightly</i> superior shoulder enchant for DPS.</li><li>Scryers are usually the less popular faction, making their reputation turn-in items often cheaper than Aldor equivalents.</li></ul><br /><br />Reputations Overview TBC Classic<br /><br /><h3 class="heading-size-3">Best in Slot Head Armor for Enhancement Shaman in TBC Classic Phase 3</h3><br /><br /><b>Cursed Vision of Sargeras</b> is the best head option available by far, with impressive stats and a sleek look to go with them. Since you will be passing on all Tier 6 set pieces, this will be your main chase item alongside your weapons. <u>This will, however, be nearly every other physical DPS's BiS head option as well</u>. You can also use <b>Forest Prowler's Helm</b> or <b>Skyshatter Cover</b> as temporary alternatives, but note that the Tier 6 helmet has much weaker throughput stats and the Tier 6 set bonuses are pretty weak for Enhancement <a href="/tbc/class=7/shaman">Shaman</a>s.<br /><br /><b>Cataclysm Helm</b> is still a great helmet, sporting great stats and a meta socket.<b> Surestrike Goggles v2.0</b> are also fine, but do not contribute towards a set bonus. Alternatively, you can use <b>Cyclone Helm</b>, which is a strong helm for a physical damage party due to the Tier 4 2-piece set bonus.<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Best in slot</td><br /><td><a href="/tbc/item=32235/cursed-vision-of-sargeras">Cursed Vision of Sargeras</a></td><br /><td>Drop: <a href="/tbc/npc=22917/illidan-stormrage">Illidan Stormrage</a> (Black Temple)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=31015/skyshatter-cover">Skyshatter Cover</a></td><br /><td>Drop: Helm of the Forgotten Protector - <a href="/tbc/npc=17968/archimonde">Archimonde</a> (Hyjal Summit)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=32376/forest-prowlers-helm">Forest Prowler's Helm</a></td><br /><td>Drop: <a href="/tbc/npc=23426/the-illidari-council">The Illidari Council</a> (Black Temple)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=30190/cataclysm-helm">Cataclysm Helm</a></td><br /><td>Drop: Helm of the Vanquished Champion: <a href="/tbc/npc=21212/lady-vashj">Lady Vashj</a> (Serpentshrine Cavern)</td><br /></tr><br /></table><br /><br />If you don't have access to the recommendation above, here are further options to choose from or farm:<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=32474/surestrike-goggles-v2-0">Surestrike Goggles v2.0</a></td><br /><td>Profession: <a href="/tbc/skill=202/engineering">Engineering</a> (BoP)</td></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=29040/cyclone-helm">Cyclone Helm</a></td><br /><td>Drop: Telm of the Fallen Champion: <a href="/tbc/npc=15690/prince-malchezaar">Prince Malchezaar</a> (Karazhan)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=28224/wastewalker-helm">Wastewalker Helm</a></td><br /><td>Drop: <a href="/tbc/npc=18096/epoch-hunter">Epoch Hunter</a> (Heroic Old Hillsbrad Foothills)</td></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=28182/helm-of-the-claw">Helm of the Claw</a></td><br /><td>Quest: <a href="/tbc/quest=9763/the-warlords-hideout">The Warlord's Hideout</a></td></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=28732/cowl-of-defiance">Cowl of Defiance</a></td><br /><td>Drop: <a href="/tbc/npc=15689/netherspite">Netherspite</a> (Karazhan)</td></tr><br /></table><br /><br /><h3 class="heading-size-3">Best in Slot Shoulder Armor for Enhancement Shaman in TBC Classic Phase 3</h3><br />The crafted <b>Swiftstrike Shoulders</b> / <b>Shoulders of Lightning Reflexes</b> are Enhancement's best shoulders in Tier 6, and very close in power. The former edges out in pure power, while the latter provides a little more longevity with its Intellect. <br /><br />Alternatively, you can still use <b>Shoulderpads of the Stranger</b> or <b>Mantle of Darkness</b>, which are slightly worse, but still very strong, overall.<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Best in slot</td><br /><td><a href="/tbc/item=32581/swiftstrike-shoulders">Swiftstrike Shoulders</a></td><br /><td>Profession: <a href="/tbc/skill=165/leatherworking">Leatherworking</a> (BoP)</td></tr><br /><br /><tr><td>Best in slot</td><br /><td><a href="/tbc/item=32575/shoulders-of-lightning-reflexes">Shoulders of Lightning Reflexes</a></td><br /><td>Profession: <a href="/tbc/skill=165/leatherworking">Leatherworking</a> (BoP)</td></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=30055/shoulderpads-of-the-stranger">Shoulderpads of the Stranger</a></td><br /><td>Drop: <a href="/tbc/npc=21216/hydross-the-unstable">Hydross the Unstable</a> (Serpentshrine Cavern)</td></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item lightly edge out <b>Vengeance Wrap</b>, but is more powerful for other classes. <br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Best in slot</td><br /><td><a href="/tbc/item=32323/shadowmoon-destroyers-drape">Shadowmoon Destroyer's Drape</a></td><br /><td>Drop: <a href="/tbc/npc=22871/teron-gorefiend">Teron Gorefiend</a> (Black Temple)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=29994/thalassian-wildercloak">Thalassian Wildercloak</a></td><br /><td>Drop: <a href="/tbc/npc=19622/kaelthas-sunstrider">Kael'thas Sunstrider</a> (Tempest Keep)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=33122/cloak-of-darkness">Cloak of Darkness</a></td><br /><td>Profession: Leatherworking - Requires Exalted with <a href="/tbc/faction=967/the-violet-eye">The Violet Eye</a></td></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=24259/vengeance-wrap">Vengeance Wrap</a></td><br /><td>Profession: Tailoring (BoE)</td><br /></tr><br /></table><br /><br />If you don't have access to the recommendation above, here are further options to choose from or farm:<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=28672/drape-of-the-dark-reavers">Drape of the Dark Reavers</a></td><br /><td>Drop: <a href="/tbc/npc=16524/shade-of-aran">Shade of Aran</a> (Karazhan)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=27878/auchenai-death-shroud">Auchenai Death Shroud</a></td><br /><td>Drop: <a href="/tbc/npc=18478/avatar-of-the-martyred">Avatar of the Martyred</a> (Heroic Auchenai Crypts)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=27892/cloak-of-the-inciter">Cloak of the Inciter</a></td><br /><td>Drop: <a href="/tbc/npc=18667/blackheart-the-inciter">Blackheart the eras-the-blind">Leotheras the Blind</a> (Serpentshrine Cavern)</td><br /></tr><br /></table><br /><br />If you don't have access to the recommendation above, here are further options to choose from or farm:<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=29966/vambraces-of-ending">Vambraces of Ending</a></td><br /><td>Drop: <a href="/tbc/npc=18805/high-astromancer-solarian">High Astromancer Solarian</a> (Tempest Keep)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=28514/bracers-of-maliciousness">Bracers of Maliciousness</a></td><br /><td>Drop: <a href="/tbc/npc=16457/maiden-of-virtue">Maiden of Virtue</a> (Karazhan)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=29527/primalstrike-bracers">Primalstrike Bracers</a></td><br /><td>Profession: Elemental Leatherworking (BoP)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=29517/ebon-netherscale-bracers">Ebon Netherscale Bracers</a></td><br /><td>Profession: Dragonscale Leatherworking (BoP)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=28171/spymistress-wristguards">Spymistress' Wristguards</a></td><br /><td>Quest: <a href="/tbc/quest=10091/the-soul-devices">The Soul Devices</a></td><br /></tr><br /></table><br /><br /><h3 class="heading-size-3">Best in Slot Hand Armor for Enhancement Shaman in TBC Classic Phase 3</h3><br /><b>Grips of Damnation</b> and <b>Fists of Mukoa</b> are both very similar for throughput, and you can use any of them in your ideal gear setup. <br /><br /><b>Gloves of the Searing Grip</b> are a fine temporary alternative, as are the <b>Cataclysm Gauntlets</b>, which have great stats and can enable Tier 5's strong 4-set bonus.<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td> t</td><br /><td><a href="/tbc/item=29283/violet-signet-of-the-master-assassin">Violet Signet of the Master Assassin</a></td><br /><td>Quest:<a href="/tbc/quest=10727/eminence-among-the-violet-eye">Eminence Among the Violet Eye</a> - Requires Exalted with The Violet Eye</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=28730/mithril-band-of-the-unscarred">Mithril Band of the Unscarred</a></td><br /><td>Drop: <a href="/tbc/npc=15689/netherspite">Netherspite</a> (Karazhan)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=29379/ring-of-arathi-warlords">Ring of Arathi Warlords</a></td><br /><td>Vendor: <a href="/tbc/npc=18525/geras">G'eras</a> (25 Badges of Justice)</td></tr><br /></table><br /><br /><h3 class="heading-size-3">Best in Slot Trinkets for Enhancement Shaman in TBC Classic Phase 3</h3><br /><b>Madness of the Betrayer</b> and <b>Dragonspine Trophy</b> are the two best trinkets to pair together. But, as we mentioned with other slots, let's also look at our (more realistic) alternatives. <b>Bloodlust Brooch</b>, and the new reputation gained <b>Ashtongue Talisman of Vision</b> are also VERY powerful trinkets. <br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><tr><td>Best in slot</td><br /><td><a href="/tbc/item=28830/dragonspine-trophy">Dragonspine Trophy</a></td><br /><td>Drop: <a href="/tbc/npc=19044/gruul-the-dragonkiller">Gruul the Dragonkiller</a> (Gruul's Lair)</td></tr><br /><br /><tr><td>Best in slot</td><br /><td><a href="/tbc/item=32505/madness-of-the-betrayer">Madness of the Betrayer</a></td><br /><td>Drop: <a href="/tbc/npc=23426/the-illidari-council">The Illidari Council</a> (Black Temple)</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=32491/ashtongue-talisman-of-vision">Ashtongue Talisman of Vision</a></td><br /><td>Vendor: <a href="/tbc/npc=23159/okuno">Okuno</a> - Requires Exalted with Ashtongue Deathsworn</td><br /></tr><br /><br /><tr><td>Great</td><br /><td><a href="/tbc/item=29383/bloodlust-brooch">Bloodlust Brooch</a></td><br /><td>Vendor: <a href="/tbc/npc=18525/geras">G'eras</a> (41 Badges of Justice)</td></tr><br /></table><br /><br />If you don't have access to the recommendations above, here are further options to choose from or farm:<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><tr><td>Best in slot -<br />Seasonal</td><br /><td><a href="/tbc/item=38287/empty-mug-of-direbrew">Empty Mug of Direbrew</a></td><br /><td>Drop: <a href="/tbc/npc=23872/coren-direbrew">Coren Direbrew</a> (Blackrock Depths)</td></tr><br /><br /><tr><td>Optional -<br />Classic Raids</td><br /><td><a href="/tbc/item=23041/slayers-crest">Slayer's Crest</a></td><br /><td>Drop: <a href="/tbc/npc=15989/sapphiron">Sapphiron</a> (Naxxramas)</td><br /></tr><br /><br /><tr><td>Optional</td><br /><td><a href="/tbc/item=31856/darkmoon-card-crusade">Darkmoon Card: Crusade</a></td><br /><td>Quest:<a href="/tbc/quest=10938/darkmoon-blessings-deck">Darkmoon Blessings Deck</a></td><br /></tr><br /><br /><tr><td>Optional</td><br /><td><a href="/tbc/item=30627/tsunami-talisman">Tsunami Talisman</a></td><br /><td>Drop: <a href="/tbc/npc=21215/leotheras-the-blind">Leotheras the Blind</a> (Serpentshrine Cavern)</td><br /></tr><br /><br /><tr><td>Optional</td><br /><td><a href="/tbc/item=28288/abacus-of-violent-odds">Abacus of Violent Odds</a></td><br /><td>Drop: <a href="/tbc/npc=19220/pathaleon-the-calculator">Pathaleon the Calculator</a> (The Mechanar)</td><br /></tr><br /><br /><tr><td>Optional</td><br /><td><a href="/tbc/item=29776/core-of-arkelos">Core of Ar'kelos</a></td><br /><td>Quest: <a href="/tbc/quest=10176/arkelos-the-guardian">Ar'kelos the Guardian</a></td><br /></tr><br /><br /><tr><td>Optional</td><br /><td><a href="/tbc/item=28034/hourglass-of-the-unraveller">Hourglass of the Unraveller</a></td><br /><td>Drop: <a href="/tbc/npc=17880/temporus">Temporus</a> (The Black Morass)</td><br /></tr><br /></table><br /><br /><h3 class="heading-size-3">Best in Slot Weapons for Enhancement Shaman in TBC Classic Phase 3</h3><br /><br />Due to <a href="/tbc/spell=16284"></a> having a 0.5-second cooldown on being consumed, <b>having weapons of matching speed</b> is very important in order to minimize attack desynching and maximize your Flurry uptime. Most of the weapons we list below have either 2.6 or 2.7 speed, and weapons with the same speed are meant to be used <b>together</b>, whenever possible. Notably, <b>Syphon of the Nathrezim</b> can be dual-wielded and has 2.8 speed, making using two of them the best non-Orc combo available in Phase 3, but far from the only option.<br /><br />For <a href="/tbc/race=2/orc">Orc</a>s, <b>Vengeful Gladiator's Cleaver</b> is the best weapon available, and you would ideally use two of them, but using the old <b>Merciless Gladiator's Cleaver</b> or any 2.6 speed off-hand is also a fine option until two can be bought. <b>Talon of the Phoenix</b> and <b>Rod of the Sun King</b> are still a very strong combo, as they were in Tier 5. Remember to favor using the axes listed in the rest of the section if you are Orc, in order to benefit from <a href="/tbc/spell=20574"></a>.<br /><br />It is important to note that the <b>Season 2 Gladiator weapons can now be purchased without rating requirements and for discounted Arena Points</b>, making them much easier and more reliable to get. Blacksmithing weapons are still strong, but players with them will finally be able to reliably get upgrades in the current tier.<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Best in slot (All)</td><br /><td><a href="/tbc/item=33669/vengeful-gladiators-cleaver">Vengeful Gladiator's Cleaver</a></td><br /><td><a href="/tbc/currency=1900"></a> Vendor</td></tr><br /><br /><tr><td>Best in slot (All)</td><br /><td><a href="/tbc/item=32262/syphon-of-the-nathrezim">Syphon of the Nathrezim</a></td><br /><td>Drop: <a href="/tbc/npc=22898/supremus">Supremus</a> (Black Temple)</td><br /></tr><br /><br /><tr><td>Optional (2.7 MH)</td><br /><td><a href="/tbc/item=32946/claw-of-molten-fury">Claw of Molten Fury</a></td><br /><td>Drop: <a href="/tbc/zone=3606/hyjal-summit">Hyjal Summit</a> Trash Mobs</td><br /></tr><br /><br /><tr><td>Optional (2.7 MH)</td><br /><td><a href="/tbc/item=32944/talon-of-the-phoenix">Talon of the Phoenix</a></td><br /><td>Drop: <a href="/tbc/npc=19514/alar">Al'ar</a> (Tempest Keep)</td><br /></tr><br /></table><br /><br />If you don't have access to the recommendations above, here are further options to choose from or farm:<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><tr><td>Optional (2.7 OH - Unique)</td><br /><td><a href="/tbc/item=29996/rod-of-the-sun-king">Rod of the Sun King</a></td><br /><td><a href="/tbc/npc=19622/kaelthas-sunstrider">Kael'thas Sunstrider</a> (Tempest Keep)</td><br /></tr><br /><br /><tr><td>Optional (2.7 MH)</td><br /><td><a href="/tbc/item=28433/wicked-edge-of-the-planes">Wicked Edge of the Planes</a></td><br /><td><a href="/tbc/skill=164/blacksmithing">Blacksmithing</a> (Master Axesmith)</td><br /></tr><br /><br /><tr><td>Optional (All)</td><br /><td><a href="/tbc/item=32236/rising-tide">Rising Tide</a></td><br /><td>Drop: <a href="/tbc/npc=22887/high-warlord-najentus">High Warlord Naj'entus</a> (Black Temple)</td><br /></tr><br /><br /><tr><td>Optional (All)</td><br /><td><a href="/tbc/item=31965/merciless-gladiators-cleaver">Merciless Gladiator's Cleaver</a></td><br /><td><a href="/tbc/currency=1901"></a></td><br /></tr><br /><br /><tr><td>Optional (2.7 MH)</td><br /><td><a href="/tbc/item=28439/dragonstrike">Dragonstrike</a></td><br /><td><a href="/tbc/skill=164/blacksmithing">Blacksmithing</a> (Master Hammersmith)</td></tr><br /><br /><tr><td>Optional (All)</td><br /><td><a href="/tbc/item=29924/netherbane">Netherbane</a></td><br /><td>Drop: <a href="/tbc/npc=19514/alar">Al'ar</a> (Tempest Keep)</td><br /></tr><br /><br /><tr><td>Optional (All)</td><br /><td><a href="/tbc/item=28308/gladiators-cleaver">Gladiator's Cleaver</a></td><br /><td><a href="/tbc/currency=1901"></a></td><br /></tr><br /><br /><tr><td>Optional (2.6 MH)</td><br /><td><a href="/tbc/item=28767/the-decapitator">The Decapitator</a></td><br /><td>Drop: <a href="/tbc/npc=15690/prince-malchezaar">Prince Malchezaar</a> (Karazhan)</td></tr><br /><br /><tr><td>Optional (All)</td><br /><td><a href="/tbc/item=27872/the-harvester-of-souls">The Harvester of Souls</a></td><br /><td>Drop: <a href="/tbc/npc=18373/exarch-maladaar">Exarch Maladaar</a> (Heroic Auchenai Crypts)</td><br /></tr><br /><br /><tr><td>Optional (All)</td><br /><td><a href="/tbc/item=28944/grand-marshals-cleaver">Grand Marshal's Cleaver</a><br /><a href="/tbc/item=28920/high-warlords-cleaver">High Warlord's Cleaver</a></td><br /><td>Honor PvP Vendor</td></tr><br /><br /><tr><td>Optional (2.6 MH)</td><br /><td><a href="/tbc/item=28657/fools-bane">Fool's Bane</a></td><br /><td>Drop: <a href="/tbc/npc=15688/terestian-illhoof">Terestian Illhoof</a> (Karazhan)</td><br /></tr><br /><br /><tr><td>Optional (2.7 MH)</td><br /><td><a href="/tbc/item=28438/dragonmaw">Dragonmaw</a></td><br /><td> Profession: Master Hammersmith Blacksmithing (BoP)</td><br /></tr><br /><br /><tr><td>Optional (2.7 MH)</td><br /><td><a href="/tbc/item=28432/black-planar-edge">Black Planar Edge</a></td><br /><td> Profession: Master Axesmith Blacksmithing (BoP)</td><br /></tr><br /><br /><tr><td>Optional (2.7 MH)</td><br /><td><a href="/tbc/item=28392/reflex-blades">Reflex Blades</a></td><br /><td>Drop: <a href="/tbc/npc=20885/dalliah-the-doomsayer">Dalliah the Doomsayer</a> (The Arcatraz)</td><br /></tr><br /><br /><tr><td>Optional (2.7 OH)</td><br /><td><a href="/tbc/item=31139/fist-of-reckoning">Fist of Reckoning</a></td><br /><td>World Drop: The Outland</td><br /></tr><br /></table><br /><br /><h3 class="heading-size-3">Best in Slot Totems for Enhancement Shaman in TBC Classic Phase 3</h3><br /><b>Totem of the Astral Winds</b> is our best, and nothing still comes even remotely close to this totem in regards to BiS for an Enhancement Shaman, definitely get this ASAP.<br /><br /><table><br /><tr> <br /><td><b>Rank</b></td><br /><td><b>Item</b></td><br /><td><b>Source</b></td><br /></tr> <br /><br /><td>Best</td><br /><td><a href="/tbc/item=27815/totem-of-the-astral-winds">Totem of the Astral Winds</a></td><br /><td>Drop: <a href="/tbc/npc=18341/pandemonius">Pandemonius</a> (Heroic Mana-Tombs)</td></noscript>            </div>

var lv_comments0 = [{"commentv2":1,"number":0,"id":5310380,"nreplies":1,"sticky":0,"user":"badfreddyboy","body":"Looking good I just want to make a couple comments.\n\n-On the shoulder section I assume you meant [item=30055] instead of [item=32581]\n\"Alternatively, you can use [item=32581] or [item=32377], which are slightly worse, but still very strong, overall.\"\n\n-And I feel like [item=28308] should be mentioned, since it can be obtained with 14k Honour [s]and 20 Eye of the storm marks now, for those who dont play arena. Might be 10 EOTS marks after BT\/MH release[\/s] No marks required","date":"2022-01-17T09:03:42-06:00","rating":0,"indent":0,"roles":0,"deleted":0,"outofdate":0,"userRating":0,"replies":[{"body":"True, thanks for picking up on that typo and I'll add the good ol'Cleaver again for people doing their honor grind, cheers :)","creationdate":"2022-01-23T08:09:24-06:00","id":1529434,"rating":1,"commentid":5310380,"dataTree":5,"roles":260,"username":"Woah","markupDisabledEnvironments":{"ptr":true,"ptr2":true,"beta":true,"d4ptr":false,"d4beta":false,"classicptr":false},"downvotedByUser":false,"reportedByUser":false,"votedByUser":false}],"dataTree":5,"markupDisabledEnvironments":{"ptr":true,"ptr2":true,"beta":true,"d4ptr":false,"d4beta":false,"classicptr":false},"lastEdit":["2022-02-02T18:05:25-06:00",3,"badfreddyboy"]},{"commentv2":1,"number":1,"id":5311728,"nreplies":3,"sticky":0,"user":"Tambard","body":"Everything is mostly correct, but it seems like the massive difference between Cursed Vision and 2nd BiS is underplayed. Enhancement gains the most between BiS and 2nd BiS in that slot compared to other physical DPS that it seems this is absolutely worth emphasizing. Similarly, the cloak and neck are larger upgrades over 2nd BiS than chest and pants. [b]Finally, Vengeful Gladiator weapons are only best in slot for Orcs. Syphons are BiS for all other races.[\/b] Otherwise, pretty good. Think you're overvaluing the Exalted Ring a tiny bit, but obv not everyone has access to Ranger General's, so that makes sense. Would also probably point out that Madness is absolutely BiS this phase, but it's not really worth aggressively pursuing over others.\n\nGreat job overall. Much better than some of the previous stuff! A+++++++++++++\n\nEdit: Spelling is tough. :(","date":"2022-01-19T17:11:54-06:00","rating":2,"indent":0,"roles":0,"deleted":0,"outofdate":0,"userRating":0,"replies":[{"body":"Since Enha is skipping on tier, it makes a lot of sense to try and get prioritized on Cursed Vision instead, which is exactly what is happening on my guild right now, can put a bit more text on that for sure. I put Syphons on the gear planner setup at the start and in the weapon gear list it has the \"Best in slot (All)\" tag just like the Vengeful Glad axes, which means both of them can be BiS, maybe it wasn't completely clear so I'll add a bit more text on that so there's no doubts. On the ring, ease of acquiring was decidedly a factor but once again, Ranger General's has the same \"Best in slot\" tag which means it is of similar value. Finally, Madness has the same \"Best in slot\" as 3 other trinkets which means you can use any of them - not a gigantic upgrade. Thanks a lot for the feedback, but make sure to look for what I wrote in each \"Rank\" column when considering the intent, as some slots have multiple \"Best in Slot\" items where any of them are close in power, and can thus be part of your bis setup.","creationdate":"2022-01-23T08:06:59-06:00","id":1529433,"rating":0,"commentid":5311728,"dataTree":5,"roles":260,"username":"Woah","markupDisabledEnvironments":{"ptr":true,"ptr2":true,"beta":true,"d4ptr":false,"d4beta":false,"classicptr":false},"downvotedByUser":false,"reportedByUser":false,"votedByUser":false},{"body":"Yeah, for the weapons, I didn't even notice on the first read through, but then I saw \"Overall, Vengeful Gladiator's Cleaver is the best weapon available,\" which caused me to point out that that's only true for <noscript><div id="user-comments"><h2 class="heading-size-2">Comments</h2><div class="user-post-"><h3 class="heading-size-3">Comment by <b>badfreddyboy</b></h3>Looking good I just want to make a couple comments.<br /><br />-On the shoulder section I assume you meant <a href="/tbc/item=30055/shoulderpads-of-the-stranger">Shoulderpads of the Stranger</a> instead of <a href="/tbc/item=32581/swiftstrike-shoulders">Swiftstrike Shoulders</a><br />&quot;Alternatively, you can use <a href="/tbc/item=32581/swiftstrike-shoulders">Swiftstrike Shoulders</a> or <a href="/tbc/item=32377/mantle-of-darkness">Mantle of Darkness</a>, which are slightly worse, but still very strong, overall.&quot;<br /><br />-And I feel like <a href="/tbc/item=28308/gladiators-cleaver">Gladiator's Cleaver</a> should be mentioned, since it can be obtained with 14k Honour <s>and 20 Eye of the storm marks now, for those who dont play arena. Might be 10 EOTS marks after BT/MH release</s> No marks required</div>

<div class="user-post-"><h3 class="heading-size-3">Comment by <b>Tambard</b></h3>Everything is mostly correct, but it seems like the massive difference between Cursed Vision and 2nd BiS is underplayed. Enhancement gains the most between BiS and 2nd BiS in that slot compared to other physical DPS that it seems this is absolutely worth emphasizing. Similarly, the cloak and neck are larger upgrades over 2nd BiS than chest and pants. <b>Finally, Vengeful Gladiator weapons are only best in slot for Orcs. Syphons are BiS for all other races.</b> Otherwise, pretty good. Think you're overvaluing the Exalted Ring a tiny bit, but obv not everyone has access to Ranger General's, so that makes sense. Would also probably point out that Madness is absolutely BiS this phase, but it's not really worth aggressively pursuing over others.<br /><br />Great job overall. Much better than some of the previous stuff! A+++++++++++++<br /><br />Edit: Spelling is tough. :(</div>

<div class="user-post-"><h3 class="heading-size-3">Comment by <b>cgillaspie16</b></h3>I was wondering, wouldn't Forest Prowler's Helm be a good upgrade if you can't get CVOS right away but have enough gear to break your T5 4piece?</div>

<div class="user-post-"><h3 class="heading-size-3">Comment by <b>Coconutshells</b></h3>Might be worth having <a href="/tbc/item=30101/bloodsea-brigands-vest">Bloodsea Brigand's Vest</a> on the chest list, as it sims better (for me at least) than t5 chest. E.g., if I have bloodsea and then get bowstitched, it's probably worth breaking tier set.</div>

<div class="user-post-"><h3 class="heading-size-3">Comment by <b>Temppeli</b></h3>I think <a href="/tbc/item=33122/cloak-of-darkness">Cloak of Darkness</a> should be added as alternative. It's comparable to <a href="/tbc/item=24259/vengeance-wrap">Vengeance Wrap</a> in terms of DPS. And while it needs more materials, Enhancement Shamans are most likely chosen Leatherworking as one of their profession, making it more accessible for them. And since you can now buy <a href="/tbc/item=23572/primal-nether">Primal Nether</a> with 10 <a href="/tbc/item=29434/badge-of-justice">Badge of Justice</a>, crafting one of these cloaks is even easier.</div>

<div class="user-post-"><h3 class="heading-size-3">Comment by <b>MHegs77</b></h3>I think the guide should point things like how Shaman should initially pursue Softstep Boots of Tracking if they are indeed comparable to Shadowmaster's Boots because the former is mail and the latter is leather and highly sought after by leather only classes like rogue/feral. I think these types of points are just as important for everyone to see how their loot fits into the big picture for their raid team and better help defer pieces to good homes. My two cents. Thank you for your time putting the pieces together for the guide.</div>

</div>
